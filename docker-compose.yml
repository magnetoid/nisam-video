version: "3.8"

services:
  # ── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nisam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-nisam_video}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nisam}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal

  # ── PgBouncer (connection pooling) ──────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-nisam}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-nisam_video}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 5
      MAX_DB_CONNECTIONS: 50
      AUTH_TYPE: scram-sha-256
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - internal

  # ── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --save 60 1000
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - internal

  # ── App (API + Frontend) ────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000

      # Database — connect via PgBouncer (no SSL needed inside compose network)
      DATABASE_URL: postgres://${POSTGRES_USER:-nisam}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB:-nisam_video}
      DB_SSL: "0"
      DB_SSL_REJECT_UNAUTHORIZED: "false"
      DB_POOL_MAX: "5"

      # Redis — internal network
      REDIS_URL: redis://redis:6379

      # Auth
      SESSION_SECRET: ${SESSION_SECRET:?Set SESSION_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME:?Set ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD}

      # Public
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://nisam.video}
      CRON_SECRET: ${CRON_SECRET:-}
      PUBLIC_ERROR_LOGS_TOKEN: ${PUBLIC_ERROR_LOGS_TOKEN:-}

      # Storage
      BLOB_READ_WRITE_TOKEN: ${BLOB_READ_WRITE_TOKEN:-}

      # Scraping
      SCRAPE_BATCH_SIZE: ${SCRAPE_BATCH_SIZE:-10}
      SCRAPE_DELAY_MS: ${SCRAPE_DELAY_MS:-300}
      SCRAPE_DELAY_MAX_MS: ${SCRAPE_DELAY_MAX_MS:-3000}

      # Optional overrides
      DISABLE_SCHEDULER: ${DISABLE_SCHEDULER:-0}
      HEALTH_PROBE_INTERVAL_MS: ${HEALTH_PROBE_INTERVAL_MS:-10000}
    ports:
      - "${APP_PORT:-3000}:3000"
    labels:
      - "coolify.managed=true"
      - "coolify.expose=true"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - internal
      - web

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  internal:
    driver: bridge
  web:
    driver: bridge
